name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx astro build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # NOTE: Playwright tests run against production (npx playwright test)
  # and cannot run in CI without a server. Run locally or post-deploy.

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: bash ~/voigt-garten/rebuild-voigt-garten.sh

      - name: Health check
        run: curl -f https://garten.infinityspace42.de/api/health
